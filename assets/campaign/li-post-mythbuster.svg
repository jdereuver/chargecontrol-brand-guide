<text x="176" y="126" font-family="Outfit" font-weight="600" font-size="34" fill="#FFFFFF">ChargeControl</text>

<text x="80" y="310" font-family="Outfit" font-weight="500" font-size="26" letter-spacing="5" fill="#38BDF8">MYTHBUSTER</text>
<text x="80" y="410" font-family="Outfit" font-weight="600" font-size="60" font-style="italic" fill="#94A3B8">"Onze laadpalen zijn</text>
<text x="80" y="486" font-family="Outfit" font-weight="600" font-size="60" font-style="italic" fill="#94A3B8">te oud om mee te doen."</text>
<line x1="78" y1="390" x2="960" y2="466" stroke="#EF4444" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
<text x="80" y="600" font-family="Outfit" font-weight="700" font-size="64" fill="#FFFFFF">Klopt meestal niet.</text>
<rect x="80" y="670" width="1040" height="250" rx="24" fill="#FFFFFF" opacity="0.07"/>
<rect x="80" y="670" width="12" height="250" rx="6" fill="#22C55E"/>
<text x="140" y="746" font-family="Outfit" font-weight="600" font-size="34" fill="#22C55E">OCPP + MID-meter?</text>
<text x="140" y="806" font-family="Inter" font-size="27" fill="#E0F2FE">Dan zetten we je paal gratis op afstand om — geen monteur,</text>
<text x="140" y="848" font-family="Inter" font-size="27" fill="#E0F2FE">geen nieuwe hardware. Vanaf dat moment verdient hij ERE-geld.</text>
<text x="80" y="990" font-family="Inter" font-size="26" fill="#7DD3FC">De scan vertelt je per paal wat kan.</text>
