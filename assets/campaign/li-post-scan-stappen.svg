<text x="176" y="126" font-family="Outfit" font-weight="600" font-size="34" fill="#FFFFFF">ChargeControl</text>

<text x="80" y="300" font-family="Outfit" font-weight="500" font-size="26" letter-spacing="5" fill="#38BDF8">DE GRATIS LAADPUNTENSCAN</text>
<text x="80" y="382" font-family="Outfit" font-weight="700" font-size="56" fill="#FFFFFF">Wat gebeurt er na de scan?</text>
<g>
<circle cx="146" cy="520" r="46" fill="#0EA5E9"/><text x="146" y="536" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="42" fill="#FFFFFF">1</text>
<text x="230" y="510" font-family="Outfit" font-weight="600" font-size="32" fill="#FFFFFF">Je vult in: merk + aantal palen</text>
<text x="230" y="552" font-family="Inter" font-size="25" fill="#B8D4EE">2 minuten, meer is het niet</text>
<circle cx="146" cy="680" r="46" fill="#0EA5E9"/><text x="146" y="696" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="42" fill="#FFFFFF">2</text>
<text x="230" y="670" font-family="Outfit" font-weight="600" font-size="32" fill="#FFFFFF">Binnen 48 uur: jullie rapport</text>
<text x="230" y="712" font-family="Inter" font-size="25" fill="#B8D4EE">jullie eigen ERE-bedrag + per paal: gratis omzetten of vervangen</text>
<circle cx="146" cy="840" r="46" fill="#22C55E"/><text x="146" y="856" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="42" fill="#FFFFFF">3</text>
<text x="230" y="830" font-family="Outfit" font-weight="600" font-size="32" fill="#FFFFFF">Jij beslist</text>
<text x="230" y="872" font-family="Inter" font-size="25" fill="#B8D4EE">geen verplichting — wat geregistreerd is, telt vanaf dan mee</text>
</g>
<text x="80" y="990" font-family="Inter" font-size="26" fill="#7DD3FC">Wat niet geregistreerd is, ben je kwijt.</text>
