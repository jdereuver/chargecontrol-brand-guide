<text x="168" y="112" font-family="Outfit" font-weight="600" font-size="34" fill="#FFFFFF">ChargeControl</text>
<text x="72" y="168" font-family="Outfit" font-weight="500" font-size="20" letter-spacing="5" fill="#38BDF8">CHARGEBACK</text>
<text x="70" y="212" font-family="Outfit" font-weight="700" font-size="42" fill="#FFFFFF">ChargeBack — home charging, reimbursed</text>
<text x="70" y="300" font-family="Inter" font-size="23" fill="#475569">Employees charge their business EV at home. ChargeBack measures every</text>
<text x="70" y="334" font-family="Inter" font-size="23" fill="#475569">session and reimburses them automatically — no spreadsheets, no receipts.</text>
<circle cx="120" cy="440" r="42" fill="#0EA5E9"/>
<text x="120" y="455" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">1</text>
<text x="200" y="436" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Charge at home</text>
<text x="200" y="474" font-family="Inter" font-size="21" fill="#475569">The driver plugs in at home like any other night.</text>
<line x1="120" y1="486" x2="120" y2="544" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
<circle cx="120" cy="590" r="42" fill="#0EA5E9"/>
<text x="120" y="605" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">2</text>
<text x="200" y="586" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Every kWh is measured</text>
<text x="200" y="624" font-family="Inter" font-size="21" fill="#475569">The session is recorded per vehicle, with exact kWh and timestamps.</text>
<line x1="120" y1="636" x2="120" y2="694" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
<circle cx="120" cy="740" r="42" fill="#0EA5E9"/>
<text x="120" y="755" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">3</text>
<text x="200" y="736" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Priced at the right tariff</text>
<text x="200" y="774" font-family="Inter" font-size="21" fill="#475569">The home energy tariff is applied — fixed, dynamic or custom rates.</text>
<line x1="120" y1="786" x2="120" y2="844" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
<circle cx="120" cy="890" r="42" fill="#F59E0B"/>
<text x="120" y="905" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">4</text>
<text x="200" y="886" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Employer approves</text>
<text x="200" y="924" font-family="Inter" font-size="21" fill="#475569">Clear monthly statements per driver; approve in one click.</text>
<line x1="120" y1="936" x2="120" y2="994" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
<circle cx="120" cy="1040" r="42" fill="#22C55E"/>
<text x="120" y="1055" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">5</text>
<text x="200" y="1036" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Automatic payout</text>
<text x="200" y="1074" font-family="Inter" font-size="21" fill="#475569">The reimbursement lands on the driver's account. Done.</text>
<rect x="70" y="1130" width="1060" height="140" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
<text x="110" y="1188" font-family="Outfit" font-weight="600" font-size="24" fill="#0B2347">Monthly statement</text>
<text x="110" y="1232" font-family="Inter" font-size="19" fill="#64748B">per driver, one click to approve</text>
<text x="480" y="1212" font-family="JetBrains Mono" font-size="22" fill="#475569">312.4 kWh × € 0.24</text>
<text x="1090" y="1215" text-anchor="end" font-family="JetBrains Mono" font-weight="600" font-size="30" fill="#22C55E">€ 74.98 reimbursed</text>
<rect y="1326" width="1200" height="74" fill="#0B2347"/>
