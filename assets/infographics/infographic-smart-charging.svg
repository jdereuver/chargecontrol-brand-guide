<text x="120" y="975" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">2</text>
<text x="200" y="956" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">The platform watches prices</text>
<text x="200" y="994" font-family="Inter" font-size="21" fill="#475569">Dynamic tariffs, solar forecast and grid signals, every 15 minutes.</text>
