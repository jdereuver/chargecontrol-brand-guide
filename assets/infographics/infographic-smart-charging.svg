<text x="200" y="1086" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Charging shifts to the cheapest hours</text>
<text x="200" y="1124" font-family="Inter" font-size="21" fill="#475569">Your EV is always full by departure — at the lowest possible cost.</text>
