<text x="120" y="845" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">1</text>
<text x="200" y="826" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Plug in — that's it</text>
<text x="200" y="864" font-family="Inter" font-size="21" fill="#475569">Set your departure time once; the platform does the rest.</text>
