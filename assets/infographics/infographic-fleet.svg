<text x="168" y="112" font-family="Outfit" font-weight="600" font-size="34" fill="#FFFFFF">ChargeControl</text>
<text x="72" y="168" font-family="Outfit" font-weight="500" font-size="20" letter-spacing="5" fill="#38BDF8">FLEET MANAGEMENT</text>
<text x="70" y="212" font-family="Outfit" font-weight="700" font-size="42" fill="#FFFFFF">One control room for your electric fleet</text>
<text x="70" y="300" font-family="Inter" font-size="23" fill="#475569">Every driver, charger and kWh — visible, billable and optimized</text>
<text x="70" y="334" font-family="Inter" font-size="23" fill="#475569">in a single platform.</text>
<rect x="70" y="390" width="330" height="150" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
<text x="94" y="454" font-family="JetBrains Mono" font-weight="600" font-size="42" fill="#0EA5E9">247</text>
<text x="94" y="500" font-family="Inter" font-size="20" fill="#64748B">vehicles under management</text>
<rect x="435" y="390" width="330" height="150" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
<text x="459" y="454" font-family="JetBrains Mono" font-weight="600" font-size="42" fill="#22C55E">98.5%</text>
<text x="459" y="500" font-family="Inter" font-size="20" fill="#64748B">charger uptime</text>
<rect x="800" y="390" width="330" height="150" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
<text x="824" y="454" font-family="JetBrains Mono" font-weight="600" font-size="42" fill="#0B2347">€ 12.4K</text>
<text x="824" y="500" font-family="Inter" font-size="20" fill="#64748B">saved this month</text>
<circle cx="120" cy="670" r="42" fill="#0EA5E9"/>
<text x="120" y="685" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">1</text>
<text x="200" y="666" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Connect everything</text>
<text x="200" y="704" font-family="Inter" font-size="21" fill="#475569">Depot chargers, home chargers and public charging — one account.</text>
<line x1="120" y1="716" x2="120" y2="754" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
<circle cx="120" cy="800" r="42" fill="#0EA5E9"/>
<text x="120" y="815" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">2</text>
<text x="200" y="796" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Automate the money flow</text>
<text x="200" y="834" font-family="Inter" font-size="21" fill="#475569">ChargeBack reimbursement, split billing and invoicing run themselves.</text>
<line x1="120" y1="846" x2="120" y2="884" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
<circle cx="120" cy="930" r="42" fill="#0EA5E9"/>
<text x="120" y="945" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">3</text>
<text x="200" y="926" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Optimize every session</text>
<text x="200" y="964" font-family="Inter" font-size="21" fill="#475569">Smart charging trims energy costs across the whole fleet.</text>
<line x1="120" y1="976" x2="120" y2="1014" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
<circle cx="120" cy="1060" r="42" fill="#22C55E"/>
<text x="120" y="1075" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="40" fill="#FFFFFF">4</text>
<text x="200" y="1056" font-family="Outfit" font-weight="600" font-size="30" fill="#0B2347">Report with confidence</text>
<text x="200" y="1094" font-family="Inter" font-size="21" fill="#475569">CO2, cost and usage reporting per driver, vehicle or site.</text>
